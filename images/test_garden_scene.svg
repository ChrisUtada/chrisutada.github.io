<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="50%" style="stop-color:#1a1f2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <radialGradient id="lightGlow" cx="50%" cy="37%" r="35%">
      <stop offset="0%" style="stop-color:rgba(20,184,166,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(20,184,166,0)"/>
    </radialGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  
  <!-- 左侧帘幕 -->
  <path d="M 0,0 L 280,0 L 220,1080 L 0,1080 Z" fill="rgba(10,12,18,0.9)"/>
  
  <!-- 右侧帘幕 -->
  <path d="M 1920,0 L 1640,0 L 1700,1080 L 1920,1080 Z" fill="rgba(10,12,18,0.9)"/>
  
  <!-- 地面阴影 -->
  <rect x="0" y="850" width="1920" height="230" fill="rgba(15,20,30,0.6)"/>
  
  <!-- 书桌 -->
  <rect x="350" y="650" width="280" height="180" fill="#2a1f1a"/>
  <rect x="370" y="830" width="20" height="100" fill="#2a1f1a"/>
  <rect x="610" y="830" width="20" height="100" fill="#2a1f1a"/>
  
  <!-- 台灯 -->
  <rect x="480" y="580" width="15" height="70" fill="#8b7355"/>
  <path d="M 460,580 L 515,580 L 505,550 L 470,550 Z" fill="#d4af37"/>
  
  <!-- 唱机 -->
  <rect x="1200" y="700" width="200" height="120" fill="#1a1510"/>
  <circle cx="1300" cy="760" r="50" fill="#0a0a0a"/>
  
  <!-- 悬挂绳索 -->
  <line x1="960" y1="0" x2="958" y2="280" stroke="#050505" stroke-width="4"/>
  
  <!-- 黑影 -->
  <ellipse cx="960" cy="380" rx="45" ry="90" fill="rgba(5,5,5,0.95)"/>
  
  <!-- 注射器 -->
  <g transform="translate(850,920) rotate(-8.6)">
    <rect x="0" y="0" width="120" height="18" fill="rgba(20,184,166,0.3)" stroke="#14b8a6" stroke-width="1.5"/>
    <rect x="8" y="3" width="50" height="12" fill="rgba(217,119,6,0.6)"/>
    <line x1="-20" y1="9" x2="0" y2="9" stroke="#94a3b8" stroke-width="2"/>
  </g>
  
  <!-- 环境光效 -->
  <rect width="1920" height="1080" fill="url(#lightGlow)"/>
  
  <!-- 标题文字 -->
  <text x="960" y="60" text-anchor="middle" fill="rgba(148,163,184,0.3)" font-size="24" font-weight="bold" font-family="Arial">植物学家的花园 - 测试场景</text>
  <text x="960" y="100" text-anchor="middle" fill="rgba(148,163,184,0.3)" font-size="16" font-family="Arial">按 H 键或点击按钮可隐藏/显示文本层</text>
</svg>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T.E.C-OS</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background: #e0e0e0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* 启动界面 */
        .boot-screen {
            text-align: center;
        }

        .boot-title {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 8px;
            color: #000;
            margin-bottom: 20px;
        }

        .boot-subtitle {
            font-size: 14px;
            color: #666;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }

        .boot-btn {
            background: #c0c0c0;
            border: 2px outset #ffffff;
            color: #333333;
            padding: 14px 48px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
        }

        .boot-btn:hover {
            background: #d0d0d0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .boot-btn:active {
            border-style: inset;
        }

        .boot-note {
            font-size: 12px;
            color: #999;
            margin-top: 30px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="boot-screen">
        <div class="boot-title">欢迎进入T.E.C-OS V5.0</div>
        <div class="boot-subtitle">异动区域已被锁定 // 因果重建已完成</div>
        <button class="boot-btn" onclick="location.href='cases.html'">案件档案库</button>
        <div class="boot-note">V5.0.0</div>
    </div>

</body>
</html>
